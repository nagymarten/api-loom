<p-popover #opTextarea (onHide)="onOverlayHide()" [baseZIndex]="1000">
  <p-floatlabel variant="on">
    <textarea
      pTextarea
      id="over_label"
      [(ngModel)]="text"
      rows="5"
      cols="30"
      style="resize: none"
      class="h-full"
      (keydown.enter)="onOverlayHide()"
    ></textarea>
    <label for="on_label">{{ "DESCRIPTION" | translate }}</label>
  </p-floatlabel></p-popover
>
